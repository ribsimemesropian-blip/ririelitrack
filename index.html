<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090f">
<title>Perf Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#09090f;--s1:#111119;--s2:#181822;--s3:#1f1f2c;
--b1:rgba(255,255,255,.05);--b2:rgba(255,255,255,.09);
--t:#ededf2;--t2:#8e8ea0;--t3:#55556a;
--grn:#00d97e;--grn-bg:rgba(0,217,126,.07);
--blu:#4f8aff;--blu-bg:rgba(79,138,255,.07);
--red:#ff5068;--red-bg:rgba(255,80,104,.07);
--org:#ffb03a;--org-bg:rgba(255,176,58,.07);
--pur:#a97eff;
--r:12px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'JetBrains Mono',monospace}

/* == HEADER == */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:90;background:rgba(9,9,15,.9);backdrop-filter:blur(16px)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-ico{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--grn),var(--blu));display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:-.3px}
.hdr h1 span{color:var(--t3);font-weight:400;font-size:11px;margin-left:5px}
.hdr-right{display:flex;gap:5px}
.hdr-btn{width:34px;height:34px;border-radius:var(--rs);border:1px solid var(--b1);background:var(--s1);color:var(--t2);display:grid;place-items:center;font-size:14px;transition:.15s}
.hdr-btn:hover{background:var(--s2);color:var(--t)}

/* == PROFILE SWITCH == */
.prof{display:flex;gap:3px;padding:12px 16px 0}
.prof-btn{flex:1;padding:9px 0;border:none;border-radius:var(--r) var(--r) 0 0;background:var(--s1);color:var(--t3);font-size:13px;font-weight:600;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px;position:relative}
.prof-btn.on{color:var(--t);background:var(--s2)}
.prof-btn .av{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff}
.prof-btn[data-p="riri"] .av{background:var(--grn)}
.prof-btn[data-p="eli"] .av{background:var(--org)}
.prof-btn.on::after{content:'';position:absolute;bottom:0;left:25%;width:50%;height:2px;border-radius:2px}
.prof-btn[data-p="riri"].on::after{background:var(--grn)}
.prof-btn[data-p="eli"].on::after{background:var(--org)}

/* == SUB NAV == */
.snav{display:flex;gap:2px;padding:0 16px;margin-bottom:14px}
.snav-btn{padding:8px 14px;border:none;background:transparent;color:var(--t3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;transition:.15s;border-radius:0 0 var(--rs) var(--rs)}
.snav-btn.on{color:var(--t);background:var(--s1)}

/* == CONTENT == */
.main{padding:0 16px 100px}
.panel{display:none}
.panel.on{display:block;animation:fin .25s ease-out}
@keyframes fin{from{opacity:0;transform:translateY(5px)}}

/* == UPLOAD BAR == */
.upload-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;padding:12px 14px;border:1px dashed var(--b2);border-radius:var(--r);background:var(--s1);cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.upload-bar:hover{border-color:var(--grn);background:var(--grn-bg)}
.upload-bar.meta:hover{border-color:var(--blu);background:var(--blu-bg)}
.upload-bar input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-bar .ui{font-size:20px}
.upload-bar .ut{flex:1}
.upload-bar .ut strong{font-size:13px;display:block;margin-bottom:1px}
.upload-bar .ut span{font-size:11px;color:var(--t3)}

/* == LOADING == */
.ai-loading{display:none;align-items:center;gap:9px;padding:11px 14px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:14px;font-size:12px;color:var(--t2)}
.ai-loading.on{display:flex}
.ai-loading .dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse .8s ease-in-out infinite alternate}
.ai-loading .dot:nth-child(2){animation-delay:.15s}
.ai-loading .dot:nth-child(3){animation-delay:.3s}
@keyframes pulse{from{opacity:.3;transform:scale(.8)}to{opacity:1;transform:scale(1.2)}}

/* == TABLE == */
.tbl-wrap{border:1px solid var(--b1);border-radius:var(--r);background:var(--s1);overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:580px}
th{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);padding:10px 12px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap;background:var(--s1);position:sticky;top:0;z-index:2}
td{padding:9px 12px;border-bottom:1px solid var(--b1);font-size:12px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
td.val{font-family:'JetBrains Mono',monospace;font-weight:500}
td.val.big{font-size:13px;font-weight:700}
td.truncate{max-width:130px;overflow:hidden;text-overflow:ellipsis}
td.dim{color:var(--t2)}
td .edit-inp{background:transparent;border:1px solid var(--b2);border-radius:4px;color:var(--t);font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 6px;width:70px;outline:none;transition:.15s}
td .edit-inp:focus{border-color:var(--grn)}

.badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:5px;font-weight:600;display:inline-block;letter-spacing:.3px}
.badge-top{color:var(--grn);background:var(--grn-bg);border:1px solid rgba(0,217,126,.18)}
.badge-ok{color:var(--org);background:var(--org-bg);border:1px solid rgba(255,176,58,.18)}
.badge-flop{color:var(--red);background:var(--red-bg);border:1px solid rgba(255,80,104,.18)}

.act-btn{background:none;border:1px solid var(--b1);border-radius:5px;color:var(--t3);padding:3px 7px;font-size:10px;transition:.15s}
.act-btn:hover{color:var(--t);border-color:var(--b2)}
.act-btn.del:hover{color:var(--red);border-color:rgba(255,80,104,.3)}

/* == OVERVIEW STATS == */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px 12px;text-align:center}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.stat.grn .stat-val{color:var(--grn)}
.stat.blu .stat-val{color:var(--blu)}
.stat.pur .stat-val{color:var(--pur)}
.stat.org .stat-val{color:var(--org)}

.sec-title{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px;display:flex;align-items:center;gap:7px}
.sec-title .dot{width:7px;height:7px;border-radius:50%}

/* == EMPTY == */
.empty{text-align:center;padding:40px 16px;color:var(--t3)}
.empty span{font-size:32px;display:block;margin-bottom:8px;opacity:.35}
.empty h3{font-size:13px;font-weight:500;color:var(--t2);margin-bottom:3px}
.empty p{font-size:11px;line-height:1.5}

/* == LIGHTBOX == */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;place-items:center;cursor:zoom-out;padding:16px}
.lb.on{display:grid}
.lb img{max-width:96%;max-height:92vh;border-radius:8px}

/* == MOBILE NAV == */
@media(max-width:768px){
.stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-ico">P</div>
    <h1>Perf Hub <span>v3</span></h1>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" onclick="doExport()" title="Export">&#8595;</button>
    <button class="hdr-btn" onclick="doImport()" title="Import">&#8593;</button>
  </div>
</header>

<div class="prof">
  <button class="prof-btn on" data-p="riri" onclick="setProf('riri')"><span class="av">R</span>Riri</button>
  <button class="prof-btn" data-p="eli" onclick="setProf('eli')"><span class="av">E</span>Eli</button>
</div>
<div class="snav">
  <button class="snav-btn on" data-v="ov" onclick="setView('ov')">&#9673; Overview</button>
  <button class="snav-btn" data-v="org" onclick="setView('org')">&#9679; Organique</button>
  <button class="snav-btn" data-v="met" onclick="setView('met')">&#9679; Meta Ads</button>
</div>

<div class="main">
  <!-- OVERVIEW -->
  <div class="panel on" id="p-ov"></div>

  <!-- ORGANIC -->
  <div class="panel" id="p-org">
    <div class="upload-bar" id="up-org">
      <span class="ui">&#128241;</span>
      <div class="ut"><strong>Ajouter un screen organique</strong><span>L'IA extrait vues, likes, commentaires...</span></div>
      <input type="file" accept="image/*" multiple id="fi-org">
    </div>
    <div class="ai-loading" id="al-org"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Analyse IA en cours...</span></div>
    <div id="t-org"></div>
  </div>

  <!-- META -->
  <div class="panel" id="p-met">
    <div class="upload-bar meta" id="up-met">
      <span class="ui">&#128202;</span>
      <div class="ut"><strong>Ajouter un screen Meta Ads</strong><span>L'IA extrait CPC, ROAS, conversions...</span></div>
      <input type="file" accept="image/*" multiple id="fi-met">
    </div>
    <div class="ai-loading" id="al-met"><div class="dot" style="background:var(--blu)"></div><div class="dot" style="background:var(--blu)"></div><div class="dot" style="background:var(--blu)"></div><span>Analyse IA en cours...</span></div>
    <div id="t-met"></div>
  </div>
</div>

<div class="lb" id="lb" onclick="this.classList.remove('on')"><img id="lbi"></div>

<script>
// ===== STATE =====
var S = {riri:{organic:[],meta:[]},eli:{organic:[],meta:[]}};
var P = 'riri', V = 'ov';
var SK = 'perfhub_v3';

function load(){try{var d=localStorage.getItem(SK);if(d)S=JSON.parse(d)}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}

// ===== AI =====
async function aiAnalyze(b64, type){
  var mediaType = 'image/jpeg';
  if(b64.indexOf('data:image/png')===0) mediaType='image/png';
  if(b64.indexOf('data:image/webp')===0) mediaType='image/webp';
  var raw = b64.indexOf(',')>-1 ? b64.split(',')[1] : b64;

  var sysOrg = [
    'Analyse ce screenshot de performance organique (TikTok, Instagram, YouTube, etc).',
    'Extrais CHAQUE metrique numerique visible sur l\'image.',
    'IMPORTANT: Lis attentivement TOUS les chiffres affiches. Cherche: vues/views, likes/j\'aime, commentaires/comments, partages/shares, sauvegardes/saves/bookmarks, impressions, portee/reach, taux engagement, duree moyenne, abonnes gagnes.',
    'Reponds UNIQUEMENT avec ce JSON exact (aucun texte avant ou apres, aucun backtick):',
    '{"platform":"tiktok ou instagram ou youtube ou twitter ou other","content_name":"titre ou description visible du contenu","hook":"le hook ou premiere phrase visible","views":NUMBER_OR_NULL,"likes":NUMBER_OR_NULL,"comments":NUMBER_OR_NULL,"shares":NUMBER_OR_NULL,"saves":NUMBER_OR_NULL,"impressions":NUMBER_OR_NULL,"reach":NUMBER_OR_NULL,"engagement_rate":NUMBER_OR_NULL,"watch_time":"STRING_OR_NULL","followers_gained":NUMBER_OR_NULL,"performance":"top ou correct ou flop","notes":"1 phrase resume"}'
  ].join(' ');

  var sysMeta = [
    'Analyse ce screenshot de Meta Ads Manager / resultats publicitaires Meta.',
    'Extrais CHAQUE metrique numerique visible sur l\'image.',
    'IMPORTANT: Lis attentivement TOUS les chiffres affiches. Cherche: depense/amount spent, impressions, portee/reach, clics/clicks, CTR, CPC, CPM, conversions/resultats, cout par resultat, ROAS, frequence.',
    'Reponds UNIQUEMENT avec ce JSON exact (aucun texte avant ou apres, aucun backtick):',
    '{"campaign_name":"nom campagne ou ad","platform":"facebook ou instagram ou meta","status":"active ou paused ou completed","spend":NUMBER_OR_NULL,"impressions":NUMBER_OR_NULL,"reach":NUMBER_OR_NULL,"clicks":NUMBER_OR_NULL,"ctr":NUMBER_OR_NULL,"cpc":NUMBER_OR_NULL,"cpm":NUMBER_OR_NULL,"conversions":NUMBER_OR_NULL,"cost_per_conversion":NUMBER_OR_NULL,"roas":NUMBER_OR_NULL,"frequency":NUMBER_OR_NULL,"performance":"top ou correct ou flop","notes":"1 phrase resume"}'
  ].join(' ');

  try{
    var body = {
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mediaType,data:raw}},
        {type:'text',text: type==='organic' ? sysOrg : sysMeta}
      ]}]
    };
    var res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!res.ok){console.error('API status',res.status);return null}
    var data = await res.json();
    if(!data.content||!data.content.length){console.error('No content');return null}
    var txt = '';
    for(var i=0;i<data.content.length;i++){if(data.content[i].text)txt+=data.content[i].text}
    txt = txt.replace(/```json/g,'').replace(/```/g,'').trim();
    // find first { and last }
    var s=txt.indexOf('{'), e=txt.lastIndexOf('}');
    if(s===-1||e===-1){console.error('No JSON found',txt);return null}
    txt = txt.substring(s,e+1);
    // replace NUMBER_OR_NULL placeholders
    txt = txt.replace(/NUMBER_OR_NULL/g,'null').replace(/STRING_OR_NULL/g,'null');
    var parsed = JSON.parse(txt);
    console.log('AI result:', parsed);
    return parsed;
  }catch(err){
    console.error('AI error:',err);
    return null;
  }
}

// ===== FILE HANDLING =====
function initUpload(type, elId, fiId, alId){
  var area = document.getElementById(elId);
  var fi = document.getElementById(fiId);
  fi.onchange = function(e){processFiles(e.target.files,type,alId);fi.value='';};
  area.ondragover = function(e){e.preventDefault();area.classList.add('dragover');};
  area.ondragleave = function(){area.classList.remove('dragover');};
  area.ondrop = function(e){e.preventDefault();area.classList.remove('dragover');processFiles(e.dataTransfer.files,type,alId);};
}

async function processFiles(files, type, alId){
  var al = document.getElementById(alId);
  for(var i=0;i<files.length;i++){
    al.classList.add('on');
    try{
      var b64 = await readFile(files[i]);
      var small = await shrink(b64, 800, 0.7);
      var result = await aiAnalyze(b64, type);
      var entry = {
        id: Date.now()+'_'+Math.random().toString(36).substr(2,5),
        date: new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}),
        ts: Date.now(),
        img: small,
        type: type
      };
      if(result){
        for(var k in result) entry[k]=result[k];
      }else{
        // fallback defaults
        if(type==='organic') Object.assign(entry,{platform:'unknown',content_name:'A editer',hook:'',views:null,likes:null,comments:null,shares:null,saves:null,impressions:null,reach:null,engagement_rate:null,performance:'correct',notes:'Analyse echouee - clique pour editer'});
        else Object.assign(entry,{campaign_name:'A editer',platform:'meta',status:'unknown',spend:null,impressions:null,reach:null,clicks:null,ctr:null,cpc:null,cpm:null,conversions:null,cost_per_conversion:null,roas:null,frequency:null,performance:'correct',notes:'Analyse echouee - clique pour editer'});
      }
      S[P][type].unshift(entry);
      save();
      draw();
    }catch(err){console.error(err)}
  }
  al.classList.remove('on');
}

function readFile(f){return new Promise(function(ok,no){var r=new FileReader();r.onload=function(e){ok(e.target.result)};r.onerror=no;r.readAsDataURL(f)})}
function shrink(src,max,q){return new Promise(function(ok){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),w=img.width,h=img.height;if(w>max){h=h*max/w;w=max}if(h>max){w=w*max/h;h=max}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);ok(c.toDataURL('image/jpeg',q))};img.src=src})}

// ===== FORMAT =====
function F(n){if(n==null)return'\u2014';if(typeof n==='string')return n;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString('fr-FR')}
function FM(n){if(n==null)return'\u2014';return Number(n).toFixed(2)+'\u20AC'}
function PB(p){var m={top:['TOP','badge-top'],correct:['OK','badge-ok'],flop:['FLOP','badge-flop']};var x=m[p]||m.correct;return'<span class="badge '+x[1]+'">'+x[0]+'</span>'}
function PI(p){return{tiktok:'\uD83C\uDFB5',instagram:'\uD83D\uDCF8',youtube:'\u25B6',twitter:'\uD83D\uDC26',facebook:'\uD83D\uDCD8',meta:'\uD83D\uDCD8'}[p]||'\uD83D\uDCF1'}
function H(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ===== INLINE EDIT =====
function makeEditable(val, entryId, field, type, isMoney){
  var display = isMoney ? FM(val) : F(val);
  return '<span class="val-display" onclick="startEdit(this,\''+entryId+'\',\''+field+'\',\''+type+'\','+!!isMoney+')" style="cursor:pointer;border-bottom:1px dashed var(--b2);padding-bottom:1px" title="Cliquer pour modifier">'+display+'</span>';
}

window.startEdit = function(el, entryId, field, type, isMoney){
  var entries = S[P][type];
  var entry = entries.find(function(e){return e.id===entryId});
  if(!entry) return;
  var cur = entry[field];
  var inp = document.createElement('input');
  inp.className = 'edit-inp';
  inp.value = cur!=null ? cur : '';
  inp.placeholder = '...';
  el.replaceWith(inp);
  inp.focus();
  inp.select();
  function done(){
    var v = inp.value.trim();
    if(v===''||v==='\u2014') entry[field]=null;
    else{var n=parseFloat(v.replace(',','.'));entry[field]=isNaN(n)?v:n;}
    save();draw();
  }
  inp.onblur=done;
  inp.onkeydown=function(e){if(e.key==='Enter')done();if(e.key==='Escape'){draw();}};
};

// ===== RENDER =====
function draw(){drawOrg();drawMet();drawOv();}

function drawOrg(){
  var d=S[P].organic, el=document.getElementById('t-org');
  if(!d.length){el.innerHTML='<div class="empty"><span>\uD83D\uDCF1</span><h3>Aucun contenu organique</h3><p>Upload un screenshot pour commencer</p></div>';return}
  var h='<div class="tbl-wrap"><table><tr><th>Date</th><th>Plateforme</th><th>Contenu</th><th>Hook</th><th>Vues</th><th>Likes</th><th>Comm.</th><th>Partages</th><th>Saves</th><th>Eng.%</th><th>Perf</th><th>Notes</th><th></th></tr>';
  d.forEach(function(e){
    h+='<tr>'
    +'<td class="val dim">'+e.date+'</td>'
    +'<td>'+PI(e.platform)+' '+(e.platform||'\u2014')+'</td>'
    +'<td class="truncate">'+H(e.content_name||'\u2014')+'</td>'
    +'<td class="truncate dim" style="font-style:italic">'+H(e.hook||'\u2014')+'</td>'
    +'<td class="val big">'+makeEditable(e.views,e.id,'views','organic')+'</td>'
    +'<td class="val">'+makeEditable(e.likes,e.id,'likes','organic')+'</td>'
    +'<td class="val">'+makeEditable(e.comments,e.id,'comments','organic')+'</td>'
    +'<td class="val">'+makeEditable(e.shares,e.id,'shares','organic')+'</td>'
    +'<td class="val">'+makeEditable(e.saves,e.id,'saves','organic')+'</td>'
    +'<td class="val">'+makeEditable(e.engagement_rate,e.id,'engagement_rate','organic')+'</td>'
    +'<td>'+PB(e.performance)+'</td>'
    +'<td class="truncate dim" style="font-size:10px">'+H(e.notes||'')+'</td>'
    +'<td style="display:flex;gap:3px">'
      +(e.img?'<button class="act-btn" onclick="showImg(\''+e.id+'\',\'organic\')">\uD83D\uDD0D</button>':'')
      +'<button class="act-btn del" onclick="del(\'organic\',\''+e.id+'\')">\u2715</button>'
    +'</td></tr>';
  });
  h+='</table></div>';
  el.innerHTML=h;
}

function drawMet(){
  var d=S[P].meta, el=document.getElementById('t-met');
  if(!d.length){el.innerHTML='<div class="empty"><span>\uD83D\uDCCA</span><h3>Aucune campagne Meta</h3><p>Upload un screenshot pour commencer</p></div>';return}
  var h='<div class="tbl-wrap"><table><tr><th>Date</th><th>Campagne</th><th>Statut</th><th>D\u00E9pense</th><th>Impr.</th><th>Clics</th><th>CTR</th><th>CPC</th><th>CPM</th><th>Conv.</th><th>Co\u00FBt/C.</th><th>ROAS</th><th>Perf</th><th>Notes</th><th></th></tr>';
  d.forEach(function(e){
    var rc=e.roas>=2?'var(--grn)':e.roas>=1?'var(--org)':'var(--red)';
    h+='<tr>'
    +'<td class="val dim">'+e.date+'</td>'
    +'<td class="truncate">'+H(e.campaign_name||'\u2014')+'</td>'
    +'<td><span style="font-size:10px;color:'+(e.status==='active'?'var(--grn)':e.status==='paused'?'var(--org)':'var(--t3)')+'">'+(e.status||'\u2014')+'</span></td>'
    +'<td class="val big">'+makeEditable(e.spend,e.id,'spend','meta',true)+'</td>'
    +'<td class="val">'+makeEditable(e.impressions,e.id,'impressions','meta')+'</td>'
    +'<td class="val">'+makeEditable(e.clicks,e.id,'clicks','meta')+'</td>'
    +'<td class="val">'+makeEditable(e.ctr,e.id,'ctr','meta')+'</td>'
    +'<td class="val">'+makeEditable(e.cpc,e.id,'cpc','meta',true)+'</td>'
    +'<td class="val">'+makeEditable(e.cpm,e.id,'cpm','meta',true)+'</td>'
    +'<td class="val">'+makeEditable(e.conversions,e.id,'conversions','meta')+'</td>'
    +'<td class="val">'+makeEditable(e.cost_per_conversion,e.id,'cost_per_conversion','meta',true)+'</td>'
    +'<td class="val" style="color:'+rc+';font-weight:700">'+makeEditable(e.roas,e.id,'roas','meta')+'</td>'
    +'<td>'+PB(e.performance)+'</td>'
    +'<td class="truncate dim" style="font-size:10px">'+H(e.notes||'')+'</td>'
    +'<td style="display:flex;gap:3px">'
      +(e.img?'<button class="act-btn" onclick="showImg(\''+e.id+'\',\'meta\')">\uD83D\uDD0D</button>':'')
      +'<button class="act-btn del" onclick="del(\'meta\',\''+e.id+'\')">\u2715</button>'
    +'</td></tr>';
  });
  h+='</table></div>';
  el.innerHTML=h;
}

function drawOv(){
  var o=S[P].organic, m=S[P].meta, el=document.getElementById('p-ov');
  var tv=o.reduce(function(s,e){return s+(e.views||0)},0);
  var tl=o.reduce(function(s,e){return s+(e.likes||0)},0);
  var tc=o.reduce(function(s,e){return s+(e.comments||0)},0);
  var to=o.filter(function(e){return e.performance==='top'}).length;
  var ts=m.reduce(function(s,e){return s+(e.spend||0)},0);
  var tcv=m.reduce(function(s,e){return s+(e.conversions||0)},0);
  var rr=m.filter(function(e){return e.roas});
  var ar=rr.length?rr.reduce(function(s,e){return s+e.roas},0)/rr.length:0;
  var tm=m.filter(function(e){return e.performance==='top'}).length;

  var h='<div class="sec-title"><span class="dot" style="background:var(--grn)"></span>Organique \u2014 '+o.length+' contenus</div>';
  h+='<div class="stats">'
    +'<div class="stat grn"><div class="stat-val">'+F(tv)+'</div><div class="stat-lbl">Vues</div></div>'
    +'<div class="stat"><div class="stat-val">'+F(tl)+'</div><div class="stat-lbl">Likes</div></div>'
    +'<div class="stat"><div class="stat-val">'+F(tc)+'</div><div class="stat-lbl">Comm.</div></div>'
    +'<div class="stat org"><div class="stat-val">'+to+'</div><div class="stat-lbl">\uD83D\uDD25 Top</div></div>'
  +'</div>';

  if(o.length){
    var so=o.slice().sort(function(a,b){return(b.views||0)-(a.views||0)}).slice(0,8);
    h+='<div class="tbl-wrap"><table><tr><th>Contenu</th><th>Vues</th><th>Likes</th><th>Perf</th><th>Hook</th></tr>';
    so.forEach(function(e){
      h+='<tr><td>'+PI(e.platform)+' '+H(e.content_name||'\u2014')+'</td><td class="val big">'+F(e.views)+'</td><td class="val">'+F(e.likes)+'</td><td>'+PB(e.performance)+'</td><td class="dim truncate" style="font-style:italic;font-size:11px">'+H(e.hook||'\u2014')+'</td></tr>';
    });
    h+='</table></div>';
  }

  h+='<div class="sec-title" style="margin-top:22px"><span class="dot" style="background:var(--blu)"></span>Meta Ads \u2014 '+m.length+' campagnes</div>';
  h+='<div class="stats">'
    +'<div class="stat blu"><div class="stat-val">'+FM(ts)+'</div><div class="stat-lbl">D\u00E9pense</div></div>'
    +'<div class="stat"><div class="stat-val">'+F(tcv)+'</div><div class="stat-lbl">Conv.</div></div>'
    +'<div class="stat pur"><div class="stat-val">'+(ar?ar.toFixed(1)+'x':'\u2014')+'</div><div class="stat-lbl">ROAS moy.</div></div>'
    +'<div class="stat org"><div class="stat-val">'+tm+'</div><div class="stat-lbl">\uD83D\uDD25 Top</div></div>'
  +'</div>';

  if(m.length){
    var sm=m.slice().sort(function(a,b){return(b.roas||0)-(a.roas||0)}).slice(0,8);
    h+='<div class="tbl-wrap"><table><tr><th>Campagne</th><th>D\u00E9pense</th><th>ROAS</th><th>Conv.</th><th>Perf</th></tr>';
    sm.forEach(function(e){
      var rc=e.roas>=2?'var(--grn)':e.roas>=1?'var(--org)':'var(--red)';
      h+='<tr><td>'+H(e.campaign_name||'\u2014')+'</td><td class="val">'+FM(e.spend)+'</td><td class="val" style="color:'+rc+';font-weight:700">'+(e.roas!=null?e.roas+'x':'\u2014')+'</td><td class="val">'+F(e.conversions)+'</td><td>'+PB(e.performance)+'</td></tr>';
    });
    h+='</table></div>';
  }

  if(!o.length&&!m.length) h+='<div class="empty"><span>\uD83D\uDCC8</span><h3>Pas encore de donn\u00E9es</h3><p>Va dans Organique ou Meta Ads pour upload tes screenshots</p></div>';
  el.innerHTML=h;
}

// ===== ACTIONS =====
function setProf(p){P=p;document.querySelectorAll('.prof-btn').forEach(function(b){b.classList.toggle('on',b.dataset.p===p)});draw()}
function setView(v){V=v;document.querySelectorAll('.snav-btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===v)});document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on')});document.getElementById('p-'+v).classList.add('on')}
function del(type,id){if(!confirm('Supprimer ?'))return;S[P][type]=S[P][type].filter(function(e){return e.id!==id});save();draw()}
function showImg(id,type){var e=S[P][type].find(function(x){return x.id===id});if(e&&e.img){document.getElementById('lbi').src=e.img;document.getElementById('lb').classList.add('on')}}

// ===== EXPORT/IMPORT =====
function doExport(){
  var exp=JSON.parse(JSON.stringify(S));
  ['riri','eli'].forEach(function(p){['organic','meta'].forEach(function(t){exp[p][t].forEach(function(e){delete e.img})})});
  var b=new Blob([JSON.stringify(exp,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='perfhub_'+new Date().toISOString().slice(0,10)+'.json';a.click()
}
function doImport(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(d.riri&&d.eli){
          ['riri','eli'].forEach(function(p){['organic','meta'].forEach(function(t){
            if(d[p]&&d[p][t]){var ids=new Set(S[p][t].map(function(e){return e.id}));d[p][t].forEach(function(e){if(!ids.has(e.id))S[p][t].push(e)})}
          })});
          save();draw();alert('Import OK !')
        }
      }catch(err){alert('Fichier invalide')}
    };r.readAsText(f)
  };inp.click()
}

// ===== KEYBOARD =====
document.onkeydown=function(e){if(e.key==='Escape')document.getElementById('lb').classList.remove('on')};

// ===== INIT =====
load();
initUpload('organic','up-org','fi-org','al-org');
initUpload('meta','up-met','fi-met','al-met');
draw();
</script>
